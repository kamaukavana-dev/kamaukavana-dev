<svg width="600" height="200" viewBox="0 0 60 20" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="60" height="20" fill="#0d1117"/>

  <!-- Fruits -->
  <circle cx="10" cy="5" r="0.5" fill="#ff4c4c">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="25" cy="10" r="0.5" fill="#ffa500">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="45" cy="15" r="0.5" fill="#ffff00">
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Snake 1: green shells -->
  <g fill="#39ff14">
    <rect width="1" height="1" x="-1" y="5">
      <animateMotion dur="6s" repeatCount="indefinite">
        <mpath xlink:href="#path1"/>
      </animateMotion>
    </rect>
    <rect width="1" height="1" x="-2" y="5">
      <animateMotion dur="6s" repeatCount="indefinite" begin="0.2s">
        <mpath xlink:href="#path1"/>
      </animateMotion>
    </rect>
    <rect width="1" height="1" x="-3" y="5">
      <animateMotion dur="6s" repeatCount="indefinite" begin="0.4s">
        <mpath xlink:href="#path1"/>
      </animateMotion>
    </rect>
  </g>

  <!-- Snake 2: blue scissors -->
  <g fill="#58a6ff">
    <rect width="1" height="1" x="-1" y="15">
      <animateMotion dur="8s" repeatCount="indefinite">
        <mpath xlink:href="#path2"/>
      </animateMotion>
    </rect>
    <rect width="1" height="1" x="-2" y="15">
      <animateMotion dur="8s" repeatCount="indefinite" begin="0.3s">
        <mpath xlink:href="#path2"/>
      </animateMotion>
    </rect>
    <rect width="1" height="1" x="-3" y="15">
      <animateMotion dur="8s" repeatCount="indefinite" begin="0.6s">
        <mpath xlink:href="#path2"/>
      </animateMotion>
    </rect>
  </g>

  <!-- Paths -->
  <path id="path1" d="M0,5 L15,5 L15,10 L30,10 L30,5 L45,5 L45,15 L60,15" fill="none" stroke="none"/>
  <path id="path2" d="M0,15 L10,15 L10,10 L20,10 L20,15 L30,15 L30,5 L50,5 L50,15 L60,15" fill="none" stroke="none"/>
</svg>
